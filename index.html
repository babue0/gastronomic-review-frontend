<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guia Michelin Pessoal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container py-5">
      <div id="headerTitle" class="text-center mb-5">
        <h1 class="fw-bold text-danger">🍽️ Guia Michelin Pessoal</h1>
        <p class="text-muted">Suas melhores experiências gastronômicas</p>
      </div>

      <div id="authSection" class="row justify-content-center">
        <div class="col-md-5">
          <div class="card p-4 shadow-sm border-0" style="border-radius: 15px">
            <div id="loginBox">
              <h4 class="text-center mb-4 fw-bold">Entrar</h4>
              <form id="formLogin">
                <div class="mb-3">
                  <input
                    type="email"
                    id="loginEmail"
                    class="form-control"
                    placeholder="E-mail"
                    required
                  />
                </div>
                <div class="mb-4">
                  <input
                    type="password"
                    id="loginPassword"
                    class="form-control"
                    placeholder="Senha"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-danger w-100 fw-bold">
                  Entrar no Guia
                </button>
              </form>
              <p class="text-center mt-3 mb-0 small">
                Não tem conta?
                <a href="#" onclick="toggleAuth()" class="text-danger fw-bold"
                  >Cadastre-se</a
                >
              </p>
            </div>

            <div id="registerBox" class="d-none">
              <h4 class="text-center mb-4 fw-bold">Criar Conta</h4>
              <form id="formRegister">
                <div class="mb-3">
                  <input
                    type="text"
                    id="regName"
                    class="form-control"
                    placeholder="Seu Nome"
                    required
                  />
                </div>
                <div class="mb-3">
                  <input
                    type="email"
                    id="regEmail"
                    class="form-control"
                    placeholder="E-mail"
                    required
                  />
                </div>
                <div class="mb-4">
                  <input
                    type="password"
                    id="regPassword"
                    class="form-control"
                    placeholder="Senha"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold">
                  Finalizar Cadastro
                </button>
              </form>
              <p class="text-center mt-3 mb-0 small">
                Já tem conta?
                <a href="#" onclick="toggleAuth()" class="text-danger fw-bold"
                  >Fazer Login</a
                >
              </p>
            </div>
          </div>
        </div>
      </div>

      <div id="feedSection" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold">Últimas Avaliações</h3>
          <button class="btn btn-outline-secondary btn-sm" onclick="logout()">
            Sair
          </button>
        </div>

        <div class="row">
          <div class="col-md-4 mb-4">
            <div
              class="card p-4 shadow-sm border-0"
              style="border-radius: 15px; background-color: #fff3cd"
            >
              <h5 class="fw-bold mb-3 text-warning-emphasis">📸 Novo Review</h5>

              <form id="formReview">
                <div class="mb-2">
                  <input
                    type="text"
                    id="restaurantName"
                    class="form-control"
                    placeholder="Nome do Restaurante"
                    required
                  />
                </div>
                <div class="mb-2">
                  <select id="category" class="form-select" required>
                    <option value="">Categoria...</option>
                    <option value="Hambúrguer">🍔 Hambúrguer</option>
                    <option value="Pizza">🍕 Pizza</option>
                    <option value="Churrasco">🥩 Churrasco</option>
                    <option value="Japonês">🍣 Japonês</option>
                    <option value="Sobremesa">🍦 Sobremesa</option>
                  </select>
                </div>
                <div class="mb-2">
                  <select id="rating" class="form-select" required>
                    <option value="">Nota (1 a 5)...</option>
                    <option value="5">⭐⭐⭐⭐⭐ (Perfeito)</option>
                    <option value="4">⭐⭐⭐⭐ (Muito Bom)</option>
                    <option value="3">⭐⭐⭐ (Bom)</option>
                    <option value="2">⭐⭐ (Deixou a desejar)</option>
                    <option value="1">⭐ (Ruim)</option>
                  </select>
                </div>
                <div class="mb-2">
                  <textarea
                    id="comment"
                    class="form-control"
                    rows="2"
                    placeholder="O que achou do prato?"
                    required
                  ></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold text-muted"
                    >FOTO DO PRATO</label
                  >
                  <input
                    type="file"
                    id="reviewImage"
                    class="form-control"
                    accept="image/*"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">
                  Postar Avaliação
                </button>
              </form>
            </div>
          </div>

          <div class="col-md-8">
            <div class="row" id="feedContainer"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
  </body>
</html>
